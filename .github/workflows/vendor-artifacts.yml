name: vendor-artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (example: 0.6.0)"
        required: true
        type: string

jobs:
  vendor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Resolve version
        id: version
        run: echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p dist
          gh release download "v${{ steps.version.outputs.value }}" --dir dist
      - name: Record image references
        run: |
          {
            echo "ghcr.io/${{ github.repository_owner }}/helmver:v${{ steps.version.outputs.value }}"
            echo "ghcr.io/${{ github.repository_owner }}/helmver:latest"
          } > dist/image-refs.txt
      - name: Upload vendored artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helmver-v${{ steps.version.outputs.value }}
          path: dist
