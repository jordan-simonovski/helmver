name: helmver-action

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run helmver action
        uses: ./
        with:
          dir: test/acceptance/testdata/monorepo/charts
          version: dev
          comment: "false"

  comment:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run helmver action (comment only)
        uses: ./
        with:
          dir: test/acceptance/testdata/monorepo/charts
          version: dev
          check: "false"
