name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload GoReleaser dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist-${{ github.ref_name }}
          path: dist
          if-no-files-found: error

  update-action-tag:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update v1 action tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f v1 "${GITHUB_SHA}"
          git push origin v1 --force

  vendor-artifacts:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
      packages: read
    steps:
      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download GoReleaser dist artifact
        uses: actions/download-artifact@v4
        with:
          name: goreleaser-dist-${{ github.ref_name }}
          path: dist
      - name: Validate dist contents
        run: |
          if [ -z "$(ls -A dist)" ]; then
            echo "dist artifact is empty" >&2
            exit 1
          fi
      - name: Record image references
        run: |
          {
            echo "ghcr.io/${{ github.repository_owner }}/helmver:v${{ steps.version.outputs.value }}"
            echo "ghcr.io/${{ github.repository_owner }}/helmver:latest"
          } > dist/image-refs.txt
      - name: Upload vendored artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helmver-v${{ steps.version.outputs.value }}
          path: dist
